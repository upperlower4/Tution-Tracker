name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        run: npm run build

      - name: Setup Capacitor Config
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          
          
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.joymkrishna.tutionpro.app",
            "appName": "Tution Pro",
            "webDir": "dist",
            "server": {
              "androidScheme": "https",
              "hostname": "localhost",
              "cleartext": true
            }
          }
          EOF
          
          npx cap add android || true
          
          # Setup assets directory for @capacitor/assets
          mkdir -p assets
          cp public/logo.png assets/icon-only.png
          cp public/logo.png assets/icon-foreground.png
          cp public/logo.png assets/icon-background.png
          cp public/logo.png assets/splash.png
          cp public/logo.png assets/splash-dark.png
          
          # Generate App Icons and Splash Screens
          npx @capacitor/assets generate --android
          
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          
          
          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                  }
              }
          }" >> app/build.gradle
          
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk